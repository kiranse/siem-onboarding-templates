# Example props.conf and transforms.conf (generic)

# props.conf

[source::...]
SHOULD_LINEMERGE = false
TIME_PREFIX = ^\d{4}-\d{2}-\d{2}
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 30
TRUNCATE = 10000
KV_MODE = json

# transforms.conf

[extract_user]
REGEX = "user":"([^"]+)"
FORMAT = user::$1

[extract_action]
REGEX = "action":"([^"]+)"
FORMAT = action::$1

[extract_status]
REGEX = "status":"([^"]+)"
FORMAT = status::$1
